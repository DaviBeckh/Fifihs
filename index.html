<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>4Sofia</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.envelope {
  width: 250px;
  height: 180px;
  background: #ff6b81;
  position: relative;
  cursor: pointer;
  transition: transform 0.5s;
}

.envelope:hover {
  transform: scale(1.05);
}

.flap {
  width: 0;
  height: 0;
  border-left: 125px solid transparent;
  border-right: 125px solid transparent;
  border-top: 90px solid #ff4757;
  position: absolute;
  top: 2px;
  left: 0;
  transform-origin: top;
  transition: transform 0.6s;
}

.photo {
  width: 238px;
  height: 357px;
  object-fit: cover;
  position: absolute;
  top: -150px;
  left: 6px;
  border-radius: 10px;
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.6s;
}

#btn {
  position: absolute;
  bottom: -40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 8px 12px;
  border: none;
  background: #ff4757;
  color: white;
  border-radius: 5px;
  cursor: pointer;
  opacity: 0;
  transition: 0.5s;
}

.open .flap {
  transform: rotateX(180deg);
}

.open .photo {
  transform: translateY(-40px);
  opacity: 1;
}

.open #btn {
  opacity: 1;
  bottom: -60px;
}

.heart {
  position: absolute;
  color: red;
  animation: float 4s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-600px); opacity: 0; }
}
</style>
</head>

<body>

<audio id="music" src="musica.mp3"></audio>

<div class="envelope" onclick="openLetter()">
  <div class="flap"></div>
  <img src="imagem.jfif" class="photo">
  <button id="btn" onclick="event.stopPropagation(); responder()">Responder</button>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCKa219_gQ7_1Br1fCM-PHW3ev9AEzZZJ8",
  authDomain: "book4so.firebaseapp.com",
  projectId: "book4so",
  storageBucket: "book4so.firebasestorage.app",
  messagingSenderId: "39366366793",
  appId: "1:39366366793:web:53cd189032c6d598b45198",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function contarAbertura() {
  const ref = doc(db, "cartas", "cartaSo");
  const snap = await getDoc(ref);

  if (snap.exists()) {
    await updateDoc(ref, {
      quantidade: increment(1)
    });
  } else {
    await setDoc(ref, {
      quantidade: 1
    });
  }
}

// deixa global
window.contarAbertura = contarAbertura;
</script>

<!-- 🎮 LÓGICA -->
<script>
let heartInterval = null;
let opened = false;

function openLetter() {
  const env = document.querySelector(".envelope");
  env.classList.add("open");

  // 🔥 CONTA TODA VEZ QUE CLICAR
  contarAbertura();

  if (!opened) {
    opened = true;

    document.getElementById("music").play();
    createHearts();
  }
}

function responder() {
  alert("Não da pra responder por aqui kkkkkkk");
}

function createHearts() {
  if (heartInterval) return;

  heartInterval = setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 90 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
  }, 300);
}
</script>

</body>
</html>
